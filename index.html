<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.S. Enterprises - Coming Soon</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Background with video and sparks effect -->
        <div class="background">
            <video autoplay muted loop playsinline class="background-video">
                <source src="gv.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
            <div class="video-overlay"></div>
            <div class="sparks">
                <div class="spark spark1"></div>
                <div class="spark spark2"></div>
                <div class="spark spark3"></div>
                <div class="spark spark4"></div>
                <div class="spark spark5"></div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="content">
            <!-- Logo Section -->
            <div class="logo-section">
                <div class="logo-container">
                    <img src="logo.png" alt="S.S. Enterprises Logo" class="logo">
                </div>
                <h1 class="company-name">S.S. ENTERPRISES</h1>
                <p class="tagline">BEST QUALITY PROVIDER</p>
            </div>

            <!-- Coming Soon Banner -->
            <div class="coming-soon-banner">
                <div class="banner-text">
                    <span class="coming">COMING</span>
                    <span class="soon">SOON!</span>
                </div>
            </div>

            <!-- Contact Information -->
            <div class="contact-info">
                <div class="contact-item">
                    <i class="fas fa-phone"></i>
                    <span>+91 7488025531</span>
                </div>
                <div class="contact-item">
                    <i class="fas fa-map-marker-alt"></i>
                    <span>Tata Kandra Main Road, Near Usha More, Gamharia, Jamshedpur - 832108</span>
                </div>
            </div>

            <!-- WhatsApp Button -->
            <div class="whatsapp-container">
                <a href="https://wa.me/7488025531" target="_blank" class="whatsapp-btn">
                    <i class="fab fa-whatsapp"></i>
                </a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
